# fly.toml app configuration file
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'react-router-template'
primary_region = 'yyz'

[build]

[deploy]
  release_command = 'npx prisma migrate deploy'

[env]
  NODE_ENV = 'production'
  PORT = '3000'
  # Redis wiring exists as template code but isn't connected.
  # REDIS_HOST and REDIS_PASSWORD are set as secrets.
  REDIS_PORT = '6379'
  REDIS_USERNAME = 'default'
  REDIS_QUEUE = 'template'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-2x'
